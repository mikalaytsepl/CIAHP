---
- name: Bootstrap the Ansible service account
  hosts: "{{ target_node | default('all') }}" # target_user is provided by -e option, default is all - optimal only for tests
  become: true
  remote_user: "{{ initial_user | default('root') }}" # initial_user is provided by -e option, default is root

  tasks:
    - name: Create the 'ansible' user
      ansible.builtin.user:
        name: ansible
        state: present
        groups: sudo
        append: yes
        create_home: yes
        shell: /bin/bash

    - name: Allow 'ansible' user to have passwordless sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ansible
        content: "ansible ALL=(ALL) NOPASSWD: ALL"
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Set up authorized keys for the 'ansible' user
      ansible.posix.authorized_key:
        user: ansible
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"