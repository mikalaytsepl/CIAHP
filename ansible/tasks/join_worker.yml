---
- name: Check if kubelet config exists
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_config

- name: Fail if the node is already occupied
  ansible.builtin.fail:
    msg: "FATAL: This node is already part of a cluster (/etc/kubernetes/kubelet.conf exists). Manual cleanup required!"
  when: kubelet_config.stat.exists

- name: Check if kubelet binary exists
  ansible.builtin.stat:
    path: /usr/bin/kubelet
  register: kubelet_check

- name: Fail if kubelet missing
  ansible.builtin.fail:
    msg: "FATAL: Kubelet binary not found! Was initial setup executed?"
  when: not kubelet_check.stat.exists

