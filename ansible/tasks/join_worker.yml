- name: Gathering facts 
  ansible.builtin.service_facts:

- name: Kubelet service status verification
  ansible.builtin.assert:
    that:
    - ansible_facts.services['kubelet.service'].status == 'enabled'
    fail_msg: "Kubelet service not enabled. Check setup logs!"
    success_msg: "Kubelet service is running."

- name: Manager reachability check
  ansible.builtin.command: "ping -q -c 5 -w 10 {{ MANAGER_NODE_IP }}"
  register: manager_reachable 
  ignore_errors: true
  changed_when: false

- name: Fail if manager unreachable
  ansible.builtin.fail:
    msg: "FATAL: manager ({{ MANAGER_NODE_IP }}) is unreachable, cluster can not be joined"
  when: manager_reachable.rc != 0

- name: "Executing join to cluster: {{ TARGET_CLUSTER }}"
  ansible.builtin.command: "{{ JOIN_COMMAND }}"

