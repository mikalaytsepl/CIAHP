---
- name: Reset k8s cluster state
  ansible.builtin.command: "kubeadm reset -f"
  register: kubeadm_reset
  failed_when: kubeadm_reset.rc != 0 and 'command not found' not in kubeadm_reset.stderr  
  # Handle edge case: kubeadm command has already been deleted

- name: Stop and disable containerd
  ansible.builtin.systemd:
    name: containerd
    state: stopped
    enabled: false
  ignore_errors: true

- name: Unhold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: install
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Remove Kubernetes and container packages
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
      - kubernetes-cni
      - containerd
    state: absent
    autoremove: yes
    purge: yes

- name: Remove Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version | default('1.35') }}/deb/ /"
    state: absent

- name: Remove configuration directories and files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/kubernetes
    - /var/lib/etcd
    - /var/lib/kubelet
    - /etc/cni
    - /opt/cni
    - /etc/containerd
    - /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - /root/.kube
    - /home/ansible/.kube

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes