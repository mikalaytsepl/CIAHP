---
    # --- Verify Pre-requisites Block ---
    - name: Verify Pre-requisites
      block:
        - name: Check if kubelet binary exists
          ansible.builtin.stat:
            path: /usr/bin/kubelet
          register: kubelet_bin

        # write stat output into variable and evaluate it in the next task
        # playbook will fail if kubelet is not present
        - name: Fail if kubelet is missing
          ansible.builtin.fail:
            msg: "Kubelet binary not found! Are you sure initial setup was executed?"
          when: not kubelet_bin.stat.exists

        # gather services facts about the node
        - name: Gathering facts 
          ansible.builtin.service_facts:

        - name: Kubelet service status verification
          ansible.builtin.assert:
            that:
              - ansible_facts.services['kubelet.service'].status == 'enabled'
            fail_msg: "Kubelet service is not enabled or failed, check setup."
            success_msg: "Kubelet service is running, cluster can be initialized."

    # --- Cluster Config Check Block ---
    - name: Cluster config file check
      block:
        - name: Check for admin.conf
          ansible.builtin.stat: 
            path: /etc/kubernetes/admin.conf
          register: kube_check
          
        - name: Assert cluster is not initialized
          ansible.builtin.assert:
            that: 
              - not kube_check.stat.exists
            success_msg: "Cluster has not been initialized, clear to init."
            fail_msg: "Cluster is already created, aborting."

    # --- Initialization Section ---
    - name: Announce Initialization
      ansible.builtin.debug:
        msg: "Initializing cluster. CIDR: {{ cluster_cidr }} | Endpoint: {{ control_plane_endpoint }}"

    - name: Initializing the cluster (HA Ready)
      ansible.builtin.command: >
        kubeadm init 
        --pod-network-cidr={{ cluster_cidr }} 
        --control-plane-endpoint={{ control_plane_endpoint }}
        --upload-certs

    - name: Installing CNI (calico)
      kubernetes.core.k8s:
        src: https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/calico.yaml
        state: present
        kubeconfig: /etc/kubernetes/admin.conf

    # --- Wait for Components Block ---
    - name: Wait for Cluster Components
      block:
        - name: Wait for Control Plane Pods to be Running
          kubernetes.core.k8s_info:
            kubeconfig: /etc/kubernetes/admin.conf
            kind: Pod
            namespace: kube-system
            label_selectors:
              - "component={{ item }}"
          register: pod_info
          # Loop until the pod exists and its phase is 'Running'
          until: >
            pod_info.resources | length > 0 and 
            pod_info.resources[0].status.phase == 'Running'
          retries: 60
          delay: 5
          loop:
            - etcd
            - kube-apiserver
            - kube-controller-manager
            - kube-scheduler

        - name: Wait for Calico and CoreDNS to be Running
          kubernetes.core.k8s_info:
            kubeconfig: /etc/kubernetes/admin.conf
            kind: Pod
            namespace: kube-system
            label_selectors:
              - "k8s-app={{ item }}"
          register: addon_info
          until: >
            addon_info.resources | length > 0 and 
            addon_info.resources[0].status.phase == 'Running'
          retries: 60
          delay: 5
          loop:
            - calico-node
            - kube-dns